<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluencify | Seu Tutor de Inglês com IA</title>
  <meta name="description" content="Fluencify — pratique inglês falado com inteligência artificial. Tutor digital que corrige pronúncia e ajuda brasileiros a superar o bloqueio do inglês.">
  <meta name="theme-color" content="#0D1B2A">
  <meta name="author" content="Fluencify">
  <meta property="og:title" content="Fluencify | Seu Tutor de Inglês com IA">
  <meta property="og:description" content="Pratique inglês falado com inteligência artificial. Seu tutor digital que ajuda a soar mais natural.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Decorative Background Glows -->
  <div class="bg-glow bg-glow--teal" aria-hidden="true"></div>
  <div class="bg-glow bg-glow--blue" aria-hidden="true"></div>
  <div class="bg-glow bg-glow--accent" aria-hidden="true"></div>

  <!-- Page Header -->
  <header class="page-header">
    <h1 class="page-title">Fluencify</h1>
    <p class="page-subtitle">Seu melhor tutor de Inglês</p>
  </header>

  <!-- Main Card -->
  <main class="card" role="main" id="mainCard">
    <!-- Card Header -->
    <div class="card-header">
      <div class="avatar" aria-hidden="true">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12zM7 9h2v2H7V9zm4 0h2v2h-2V9zm4 0h2v2h-2V9z"/>
        </svg>
      </div>
      <div class="header-info">
        <span class="ai-name">Fluency AI</span>
        <div class="status">
          <span class="status-dot" aria-hidden="true"></span>
          <span>Online — pronto para praticar</span>
        </div>
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea" role="log" aria-live="polite" aria-label="Área de conversa">
      <!-- Messages inserted by JavaScript -->
    </div>

    <!-- Typing Indicator -->
    <div class="typing-indicator" id="typingIndicator" aria-label="IA está digitando">
      <div class="message__avatar" aria-hidden="true">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12zM7 9h2v2H7V9zm4 0h2v2h-2V9zm4 0h2v2h-2V9z"/>
        </svg>
      </div>
      <div class="typing-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <!-- Mic Section -->
    <div class="mic-section">
      <!-- Waveform Visualizer -->
      <div class="waveform" id="waveform" aria-hidden="true">
        <div class="waveform__bar"></div>
        <div class="waveform__bar"></div>
        <div class="waveform__bar"></div>
        <div class="waveform__bar"></div>
        <div class="waveform__bar"></div>
        <div class="waveform__bar"></div>
        <div class="waveform__bar"></div>
        <div class="waveform__bar"></div>
        <div class="waveform__bar"></div>
        <div class="waveform__bar"></div>
        <div class="waveform__bar"></div>
        <div class="waveform__bar"></div>
        <div class="waveform__bar"></div>
      </div>

      <!-- Mic Button with Pulse Rings -->
      <div class="mic-wrapper" id="micWrapper">
        <div class="pulse-ring" aria-hidden="true"></div>
        <div class="pulse-ring" aria-hidden="true"></div>
        <div class="pulse-ring" aria-hidden="true"></div>
        <button class="mic-btn" id="micBtn" aria-label="Clique para falar em inglês" type="button">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" id="micIcon">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>
        </button>
      </div>

      <span class="mic-label" id="micLabel">Clique para falar</span>
    </div>
  </main>

  <!-- Footer -->
  <footer class="page-footer">
    <p>Fluencify © 2026 — Powered by Web Speech API</p>
  </footer>

  <script src="scripts.js"></script>
</body>
</html>
